<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Joke Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      font-size: 2.5em;
    }

    #joke-container {
      min-height: 150px;
      background: #f8f9fa;
      border-radius: 10px;
      padding: 25px;
      margin-bottom: 30px;
      font-size: 1.1em;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }

    #joke-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 1.1em;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-weight: bold;
    }

    #joke-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    #joke-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    #joke-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #loading {
      display: none;
      text-align: center;
      margin-bottom: 20px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .category-filter {
      margin-bottom: 25px;
    }

    .category-filter label {
      margin-right: 15px;
      font-size: 0.95em;
      color: #666;
    }

    .category-filter select {
      padding: 8px 15px;
      border-radius: 6px;
      border: 2px solid #ddd;
      font-size: 1em;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>😂 Joke Generator</h1>
    
    <div id="loading">
      <div class="spinner"></div>
    </div>

    <div id="joke-container">
      Loading your first joke...
    </div>

    <button id="joke-btn">Get Another Joke 🎭</button>
  </div>

  <script src="joke-generator.js"></script>
</body>
</html>
